name: Deploy user-docs to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'user-docs/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

# Least-privilege token scopes required by deploy-pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deploy at a time; a newer push supersedes an in-flight one.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload user-docs as the Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: user-docs        # only this folder is published → index.html becomes the site root

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
